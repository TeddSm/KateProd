<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../../styles/style.css" />
    <link rel="stylesheet" href="../../styles/product.css" />
    <title>Decor</title>
  </head>
  <body>
    <header>
      <div class="container">
        <h1>HEADER</h1>
      </div>
    </header>
    <main>
      <div class="container">
        <button id="back-btn" class="back-btn">← Назад</button>
        <h1 id="js-page-title" class="page-title">Завантаження...</h1>
        <article class="product-card">
  <div class="slider-container">
    <div class="slider-track" id="js-slider-track">
      </div>
    <button class="slider-btn prev" id="js-prev-btn">❮</button>
    <button class="slider-btn next" id="js-next-btn">❯</button>
    <div class="slider-dots" id="js-dots"></div>
  </div>

  <div class="product-card-body">
    <h3 id="js-product-title" class="product-card-title">Завантаження...</h3>
    <p class="product-card-price">
      <span id="js-product-price"></span> грн.
    </p>
    <p id="js-product-text" class="product-card-text"></p>
    <p class="product-card-text">Розміри:</p>
    <p class="product-card-text">Висота: <span id="js-product-height" class="product-card-text"></span> см</p>
    <p class="product-card-text">Ширина: <span id="js-product-width" class="product-card-text"></span> см</p>
    <p class="product-card-text">Довжина: <span id="js-product-length" class="product-card-text"></span> см</p>
    <a href="../contacts.html" class="back-btn product-card-btn">Замовити</a>
  </div>
</article>
      </div>
    </main>
    <footer>
      <div class="container">
        <h1>FOOTER</h1>
      </div>
    </footer>
  </body>
  <script src="../../scripts/product.js"></script>
  <script type="module" src="../../scripts/btns.js"></script>
</html>
