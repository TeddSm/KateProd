<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../../styles/style.css" />
    <link rel="stylesheet" href="../../styles/product.css" />
    <title>Decor</title>
  </head>
  <body>
    <header>
      <div class="container">
        <h1>HEADER</h1>
      </div>
    </header>
    <main>
      <div class="container">
        <button id="back-btn" class="back-btn">← Назад</button>
        <h1 id="js-page-title" class="page-title">Завантаження...</h1>
        <article class="product-card">
          <img src="" alt="" id="js-product-img" class="product-card-img" />
          <div class="product-card-body">
            <h3 id="js-product-title" class="product-card-title">
              Завантаження...
            </h3>
            <p id="js-product-text" class="product-card-text"></p>
            <p class="product-card-price">
              Ціна: <span id="js-product-price"></span> грн/м.п.
            </p>
          </div>
        </article>
      </div>
    </main>
    <footer>
      <div class="container">
        <h1>FOOTER</h1>
      </div>
    </footer>
  </body>
  <script src="../../scripts/product.js"></script>
  <script type="module" src="../../scripts/btns.js"></script>
</html>
